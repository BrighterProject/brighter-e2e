name: e2e
# Manual-only by design. A repository_dispatch from a service merge does NOT
# surface as a check/status on the service PR (and fires post-merge anyway), so
# auto-triggering only produced unwatched runs in this repo. Run deliberately —
# Actions tab or `gh workflow run e2e.yml -f service_ref=<dev|main|...>` — so it
# is always clear when the suite ran and that its result must be reviewed.
on:
  workflow_dispatch:
    inputs:
      service_ref:
        description: "Git ref to check out for the service repos (e.g. dev, main)"
        required: false
        default: "dev"

# A new run supersedes an in-flight one for the same service_ref.
concurrency:
  group: e2e-${{ github.event.inputs.service_ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # A healthy run is ~4 min; cap well above that so a wedged stack (hung
    # build, container never healthy) fails fast instead of burning the 6h default.
    timeout-minutes: 20
    # EMAIL_TRANSPORT, SLOWAPI_NO_LIMITS, OTEL_SDK_DISABLED and the admin creds are
    # exported by the Makefile (single source of truth); no need to repeat them here.
    steps:
      # Validate the manual service_ref input before it reaches a `ref:` checkout.
      - name: Resolve service ref
        id: ref
        env:
          INPUT_REF: ${{ github.event.inputs.service_ref }}
        run: |
          if ! printf '%s' "$INPUT_REF" | grep -qE '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid service_ref: $INPUT_REF" >&2
            exit 1
          fi
          echo "service_ref=$INPUT_REF" >> "$GITHUB_OUTPUT"

      # The e2e suite is checked out from the branch the workflow runs from
      # (the default branch, since runs are manual).
      - uses: actions/checkout@v5
        with:
          path: brighter-e2e

      # The compose build contexts use ../brighter-* relative paths, so every
      # service repo must be checked out as a sibling of brighter-compose.
      # Infra repos (compose, postgres) live on main only.
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-compose, path: brighter-compose }
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-postgres, path: brighter-postgres }
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-users-ms, path: brighter-users-ms, ref: "${{ steps.ref.outputs.service_ref }}" }
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-properties-ms, path: brighter-properties-ms, ref: "${{ steps.ref.outputs.service_ref }}" }
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-bookings-ms, path: brighter-bookings-ms, ref: "${{ steps.ref.outputs.service_ref }}" }
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-payments-ms, path: brighter-payments-ms, ref: "${{ steps.ref.outputs.service_ref }}" }
      - uses: actions/checkout@v5
        with: { repository: BrighterProject/brighter-notifications-ms, path: brighter-notifications-ms, ref: "${{ steps.ref.outputs.service_ref }}" }
      - uses: astral-sh/setup-uv@v5
      - name: Lint + typecheck the e2e suite
        working-directory: brighter-e2e
        run: make lint && make typecheck
      - name: Boot stack
        working-directory: brighter-e2e
        run: make up
      - name: Seed data
        working-directory: brighter-e2e
        run: make seed
      - name: Run e2e tests
        working-directory: brighter-e2e
        run: make test
      - name: Dump logs on failure
        if: failure()
        env:
          COMPOSE_PROFILES: e2e
        run: |
          echo "::group::container states"
          docker ps -a
          echo "::endgroup::"
          # Only dump logs for containers that are unhealthy or have exited
          # non-zero — healthy containers just add noise to the failure report.
          echo "::group::unhealthy / exited containers"
          for c in $(docker ps -aq); do
            name=$(docker inspect --format '{{.Name}}' "$c")
            health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$c")
            exitcode=$(docker inspect --format '{{.State.ExitCode}}' "$c")
            state=$(docker inspect --format '{{.State.Status}}' "$c")
            if [ "$health" = "unhealthy" ] || { [ "$state" = "exited" ] && [ "$exitcode" != "0" ]; }; then
              echo "=== $name -> state=$state health=$health exit=$exitcode ==="
              docker inspect --format '{{if .State.Health}}{{range .State.Health.Log}}exit={{.ExitCode}} out={{.Output}}{{println}}{{end}}{{end}}' "$c"
              docker logs --tail 200 "$c" 2>&1 || true
            fi
          done
          echo "::endgroup::"
