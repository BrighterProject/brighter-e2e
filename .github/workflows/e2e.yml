name: e2e
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      E2E_ADMIN_USER: e2e_admin
      E2E_ADMIN_PASS: Adm1nSecret!
      OTEL_SDK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with: { path: brighter-e2e }
      # The compose build contexts use ../brighter-* relative paths, so every
      # service repo must be checked out as a sibling of brighter-compose.
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-compose, path: brighter-compose }
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-users-ms, path: brighter-users-ms }
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-properties-ms, path: brighter-properties-ms }
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-bookings-ms, path: brighter-bookings-ms }
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-payments-ms, path: brighter-payments-ms }
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-notifications-ms, path: brighter-notifications-ms }
      - uses: actions/checkout@v4
        with: { repository: BrighterProject/brighter-postgres, path: brighter-postgres }
      - uses: astral-sh/setup-uv@v5
      - name: Lint + typecheck the e2e suite
        working-directory: brighter-e2e
        run: make lint && make typecheck
      - name: Boot stack, seed, run e2e
        working-directory: brighter-e2e
        run: make e2e
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f brighter-compose/docker-compose.yml logs --no-color
